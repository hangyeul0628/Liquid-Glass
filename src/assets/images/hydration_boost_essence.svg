<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a0c4ff" />
      <stop offset="100%" stop-color="#c2e9fb" />
    </linearGradient>
    <filter id="glass" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="blur" />
      <feBlend in="SourceGraphic" in2="blur" mode="overlay" />
    </filter>
  </defs>
  <rect width="180" height="180" x="10" y="10" fill="url(#grad)" rx="20" ry="20" filter="url(#glass)" />
  <text x="100" y="110" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.8">Essence</text>
</svg>
